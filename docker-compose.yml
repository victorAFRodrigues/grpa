services:
  rpa_executor01:
    build: .
    container_name: GRPA_001
    restart: unless-stopped
    environment:
      - ENV=${ENV}
      - API_URL=${API_URL} # URL base da API utilizada pelas automações. (OBRIGATÓRIO)
      - GOEVO_APP_TPTOKEN=${GOEVO_APP_TPTOKEN} # Token de autenticação do app no GOEVO (OBRIGATÓRIO)
      - RPA_EXECUTOR=${RPA_EXECUTOR} # Identificador do executor RPA (nome do servidor ou agente)
      - GRPA_AUTOMATION_VERSION=${GRPA_AUTOMATION_VERSION} # Identificador da versão que será usada nos modulos de automação(OBRIGATÓRIO)
    env_file:
      - .env
    shm_size: 750m
    volumes:
      - ./automations:/app/automations
      - ./screenshots:/app/screenshots
      - ./logs:/app/logs

  grpa_docs:
    build: ./docs
    container_name: GRPA_DOCS
    restart: unless-stopped
    ports:
      - "3000:80"


