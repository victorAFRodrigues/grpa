services:
  rpaExecutor01:
    build: .
    container_name: GRPA_001
    restart: unless-stopped
    environment:
      - ENV=docker
      - RPA_EXECUTOR=GRPAE_001
    shm_size: 750m
    volumes:
      - ./automations/GRPAE_001:/app/automations
      - ./screenshots/GRPAE_001:/app/screenshots
      - ./logs/GRPAE_001:/app/logs


