services:
  rpa_executor01:
    build: .
    container_name: GRPA_001
    restart: unless-stopped
    environment:
      - ENV=docker
      - RPA_EXECUTOR=GRPA_DEV_001
    shm_size: 750m
    volumes:
      - ./automations:/app/automations
      - ./screenshots:/app/screenshots
      - ./logs:/app/logs

  grpa_docs:
    build: ./docs
    container_name: GRPA_DOCS
    restart: unless-stopped
    ports:
      - "3000:80"


