<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - GoEvo RPA</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .success-container {
            text-align: center;
            padding: 60px 20px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(0, 255, 136, 0);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--success);
        }

        p {
            color: #8b949e;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: var(--surface);
            color: var(--text);
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #21262d;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1>Configuração Salva!</h1>
        <p>O arquivo .env foi gerado com sucesso.</p>
        <a href="/" class="btn">Nova Configuração</a>
    </div>
</body>
</html>
